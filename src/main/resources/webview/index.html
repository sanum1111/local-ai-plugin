CRITICAL ARCHITECTURE RULE: You have TWO ways to interact with the local filesystem.

### METHOD 1: DIRECT I/O (PREFERRED FOR SIMPLE OPERATIONS)
If you only need to read a file, list a directory, or write a straightforward file, DO NOT use the \`/delegate\` endpoint. Use the direct REST APIs. This avoids LLM-to-LLM hallucination.

GET http://${o}:${e}/list?path=<dir>
GET http://${o}:${e}/read?path=<file>

${a?`(Include Header: ${a})\n`:``}

### METHOD 2: DELEGATION (FOR AUTONOMOUS TASKS)
If you need the local AI to perform a multi-step task autonomously (e.g., "Refactor this folder", "Find all files with X and replace with Y"), use the \`/delegate\` endpoint to trigger its Agentic Loop.

POST http://${o}:${e}/delegate
Content-Type: application/json
${a?a+`
`:``}
{
  "task": "<REQUIRED: Brutally explicit instruction. See ANTI-HALLUCINATION below>",
${s}
  "systemPrompt": "<optional: override the default system prompt>",

## ⚠️ TERMINAL EXECUTION NOTES (WINDOWS / POWERSHELL)
If you test these endpoints via terminal commands, REMEMBER that standard \`curl\` in PowerShell is an alias for \`Invoke-WebRequest\` and will fail with bash flags like \`-H\` or \`-d\`. 
To avoid syntax errors, you MUST use one of the following approaches:
1. Explicitly use \`curl.exe\` instead of just \`curl\`.
2. Use PowerShell native cmdlets:
   \`Invoke-RestMethod -Uri "http://${o}:${e}/delegate" -Method Post -ContentType "application/json" -Body '{"task":"..."}'\`
3. Write a quick Node.js/Python script using \`fetch()\` or \`requests\`.

## ANTI-HALLUCINATION RULES FOR "task"
When writing the "task" string for the local model, remember it is an LLM. If you are vague, it will guess. 
- BAD TASK: "Read file config.json" (Model will hallucinate a config file).
- GOOD TASK: "CRITICAL: Use your 'read' tool to fetch 'package.json'. Extract the raw text from the 'content' field. YOU MUST OUTPUT ONLY THE RAW TEXT. ABSOLUTELY NO CONVERSATIONAL FILLER. Do not say 'Here is the text'. No markdown blocks. Just the raw data."

## Response from /delegate (HTTP 200)
{
  "result": "<final plain-text answer from the local model>",
  "model":  "<Ollama model that was used>",
  "loops":  <number of agentic loop iterations consumed>
}

## Error responses (always JSON)
{ "error": "...", "details": "..." }
